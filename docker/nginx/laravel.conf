server {
    listen 80;
    index index.php;
    root /var/www/public;

    client_max_body_size 200m;
    client_body_buffer_size 160k;

    # Headers para Content Security Policy - Permitir Mercado Pago
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://sdk.mercadopago.com https://http2.mlstatic.com; connect-src 'self' https://api.mercadopago.com https://http2.mlstatic.com; frame-src 'self' https://www.mercadopago.com; img-src 'self' data: https: http:; style-src 'self' 'unsafe-inline' https://http2.mlstatic.com; font-src 'self' data: https://http2.mlstatic.com;" always;

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
